<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Aim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="hud">
      <span id="score">0</span>
      <span id="timer">30.0</span>
    </div>
    <div id="game-wrapper">
      <canvas id="canvas"></canvas>
      <div id="highscore">
        <span class="label">Highscore</span>
        <span class="value" id="highscore-value">0</span>
      </div>
    </div>
    <p id="message">Press any key to start</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
