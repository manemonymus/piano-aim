<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <meta name="description" content="Piano Aim — a fast-paced reflex game. Click the black tiles before the timer runs out. Compete on the global leaderboard.">
  <meta name="keywords" content="piano aim, piano tiles game, reflex game, typing game, leaderboard">

  <!-- Open Graph — controls how it looks when shared on social media -->
  <meta property="og:title" content="Piano Aim">
  <meta property="og:description" content="A fast-paced reflex game with a global leaderboard.">
  <meta property="og:url" content="https://pianoaim.com">
  <meta property="og:type" content="website">

  <title>Piano Aim</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="layout">
    <div id="leaderboard">
      <h2 class="leaderboard-title">Global</h2>
      <ol id="leaderboard-list"></ol>
    </div>
    <div id="app">
      <div id="hud">
        <span id="score">0</span>
        <span id="timer">30.0</span>
      </div>
      <div id="game-wrapper">
        <canvas id="canvas"></canvas>
        <div id="highscore">
          <span class="label">Highscore</span>
          <span class="value" id="highscore-value">0</span>
        </div>
      </div>
      <p id="message">Press any key to start</p>
      <div id="name-entry" style="display:none">
        <input id="name-input" type="text" placeholder="Enter your name..." maxlength="20" />
        <p id="name-hint">Press Enter to submit</p>
        <button id="submit-btn">Submit</button>
      </div>
      <button id="restart-btn" style="display:none">Tap to Restart</button>
      <button id="start-btn" style="display:none">Tap to Start</button>
    </div>
  </div>

  <button id="stats-btn" style="display:none">📊 Stats</button>

  <div id="stats-modal" style="display:none">
    <div id="stats-content">
      <h2>Highscore</h2>
      <p id="modal-highscore">0</p>
      <h2>Global Leaderboard</h2>
      <ol id="modal-leaderboard-list"></ol>
      <button id="close-modal">Close</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
